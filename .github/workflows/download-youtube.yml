name: Download YouTube Video

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URL'
        required: true
        type: string
      quality:
        description: 'Quality (e.g. 2160, 1440, 1080, 720, 480, 360, best, worst)'
        required: true
        default: '1080'
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Install yt-dlp and ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install -U yt-dlp

      - name: Download video
        run: |
          mkdir -p downloads
          QUALITY="${{ github.event.inputs.quality }}"
          if [ "$QUALITY" = "best" ]; then
            FORMAT="bestvideo+bestaudio/best"
          elif [ "$QUALITY" = "worst" ]; then
            FORMAT="worstvideo+worstaudio/worst"
          else
            FORMAT="bestvideo[height<=${QUALITY}]+bestaudio/best[height<=${QUALITY}]"
          fi

          yt-dlp -f "$FORMAT" \
            --merge-output-format mp4 \
            -o "downloads/%(title)s.%(ext)s" \
            "${{ github.event.inputs.video_url }}"

      - name: List downloaded file
        run: ls -lh downloads/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-video
          path: downloads/
          retention-days: 5
